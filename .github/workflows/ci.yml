# Viewora Marketing — CI
# Builds the static marketing site on every push/PR to main.
# Deployment: Vercel (auto-deploys on push to main via Vercel GitHub integration)
# Rule: NO API calls, NO Supabase, NO env secrets required.

name: Marketing CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Static Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run generate
